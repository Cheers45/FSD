<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Task Manager</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body class="container mt-5">

    <h2 class="mb-4">
        Task Manager
    </h2>

    <div class="card p-4 shadow-sm">

        <form>

            <div class="mb-3">

                <label class="form-label">
                    Task Title
                </label>

                <input
                    type="text"
                    class="form-control"
                    placeholder="Enter task title">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Task Description
                </label>

                <textarea
                    class="form-control"
                    rows="4"
                    placeholder="Enter task description"></textarea>

            </div>

            <button
                type="submit"
                class="btn btn-primary">

                Add Task

            </button>

        </form>

    </div>

    <table class="table table-bordered table-striped mt-5">

        <thead class="table-dark">

            <tr>

                <th>ID</th>
                <th>Title</th>
                <th>Description</th>
                <th>Action</th>

            </tr>

        </thead>

        <tbody>

            <tr>

                <td>1</td>

                <td>Complete Assignment</td>

                <td>Finish Laravel CRUD project</td>

                <td>

                    <button class="btn btn-sm btn-primary">
                        Edit
                    </button>

                    <button class="btn btn-sm btn-danger">
                        Delete
                    </button>

                </td>

            </tr>

            <tr>

                <td>2</td>

                <td>Study PHP</td>

                <td>Practice arrays and string functions</td>

                <td>

                    <button class="btn btn-sm btn-primary">
                        Edit
                    </button>

                    <button class="btn btn-sm btn-danger">
                        Delete
                    </button>

                </td>

            </tr>

        </tbody>

    </table>

</body>

</html>
